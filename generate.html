<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メッセージ一括生成 | MsgGenie</title>
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="stylesheet" href="common.css">
    <style>
        .setup-area {
            margin-bottom: 30px;
        }
        
        .setup-area label {
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        /* テーブル内のテキストエリアスタイル（改行対応） */
        td textarea.var-input {
            margin-bottom: 0;
            border: 1px solid transparent;
            background: transparent;
            padding: 10px;
            border-radius: 6px;
            width: 100%;
            min-width: 180px; /* 改行用に少し広めに */
            box-shadow: none;
            transition: background-color 0.2s, border-color 0.2s;
            resize: vertical; /* 縦方向のみサイズ変更可能 */
            font-family: inherit;
            font-size: 1rem;
            line-height: 1.4;
        }

        td textarea.var-input:focus {
            background: white;
            border: 1px solid var(--primary-color);
            box-shadow: 0 0 0 2px rgba(6, 199, 85, 0.1);
            outline: none;
        }

        td textarea.var-input:hover:not(:focus) {
            background-color: #f8fafc;
            border-color: #e2e8f0;
        }

        /* プレビューエリア */
        .preview-area {
            display: none;
            margin-top: 20px;
        }
        .preview-card {
            background: #fff;
            border: 2px solid var(--secondary-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            box-shadow: var(--shadow-md);
            transition: border-color 0.2s;
        }
        .preview-card:hover {
            border-color: var(--primary-color);
        }
        .preview-text {
            white-space: pre-wrap; /* これにより改行が画面上に反映される */
            font-size: 1rem;
            margin-bottom: 20px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            line-height: 1.6;
        }
        .preview-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }
        .btn-line {
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            padding: 10px 24px;
            border-radius: 24px;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
        }
        .btn-line:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .btn-line::before {
            content: 'LINE';
            font-weight: 900;
            margin-right: 8px;
        }
        .template-preview-box {
            font-size: 0.9rem;
            color: var(--text-light);
            white-space: pre-wrap;
            margin-top: 15px;
            display: none;
            background: var(--secondary-color);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--primary-color);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-title">💬 MsgGenie</div>
    </header>

    <main>
        <h1>メッセージ一括生成</h1>

        <div class="card setup-area">
            <label>使用するテンプレートを選択</label>
            <select id="templateSelect" onchange="setupTable()">
                <option value="">-- 読み込み中... --</option>
            </select>
            <div id="templatePreview" class="template-preview-box"></div>
        </div>

        <div id="inputArea" style="display: none;">
            <div class="action-bar">
                <h2 style="margin: 0;">リスト入力</h2>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-secondary" onclick="addRow()">＋ 行を追加</button>
                    <button class="btn btn-primary" onclick="generateMessages()">✨ メッセージを生成</button>
                </div>
            </div>

            <div class="table-container">
                <table id="dataTable">
                    <thead>
                        <tr id="tableHeader">
                            <!-- JSで動的にヘッダーを生成 -->
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- JSで動的に入力行を生成 -->
                    </tbody>
                </table>
            </div>
        </div>

        <div id="resultArea" class="preview-area">
            <div class="action-bar">
                <h2 style="margin: 0;">生成結果</h2>
                <button class="btn btn-secondary" onclick="backToInput()">← 入力に戻る</button>
            </div>
            <div id="previewList">
                <!-- 生成結果がここに表示される -->
            </div>
        </div>

    </main>

    <footer>
        <p>© 2026 QcDa Project. All Rights Reserved.</p>
    </footer>

    <script src="common.js"></script>
    <script>
        let currentTemplate = null;

        // Firebase初期化後のdbReadyイベントを待つ
        document.addEventListener('dbReady', async () => {
            const select = document.getElementById('templateSelect');
            const templates = await DB.getTemplates();
            
            select.innerHTML = '<option value="">-- テンプレートを選択してください --</option>';
            templates.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.id;
                opt.textContent = t.name;
                select.appendChild(opt);
            });
        });

        function setupTable() {
            const select = document.getElementById('templateSelect');
            const id = select.value;
            const previewEl = document.getElementById('templatePreview');
            
            if (!id) {
                document.getElementById('inputArea').style.display = 'none';
                previewEl.style.display = 'none';
                currentTemplate = null;
                return;
            }

            currentTemplate = DB.getTemplateById(id);
            if(!currentTemplate) return;

            // テンプレートプレビューの表示
            previewEl.textContent = currentTemplate.content;
            previewEl.style.display = 'block';

            // テーブルの構築
            const thead = document.getElementById('tableHeader');
            const tbody = document.getElementById('tableBody');
            
            thead.innerHTML = '';
            tbody.innerHTML = '';

            // ヘッダー作成
            const thNum = document.createElement('th');
            thNum.textContent = '#';
            thNum.style.width = '40px';
            thead.appendChild(thNum);

            currentTemplate.variables.forEach(v => {
                const th = document.createElement('th');
                th.textContent = v;
                thead.appendChild(th);
            });
            
            const thAction = document.createElement('th');
            thAction.textContent = '操作';
            thAction.style.width = '60px';
            thead.appendChild(thAction);

            // 初期行を3行追加
            for(let i=0; i<3; i++) {
                addRow();
            }

            document.getElementById('inputArea').style.display = 'block';
            document.getElementById('resultArea').style.display = 'none';
        }

        function addRow() {
            if(!currentTemplate) return;
            const tbody = document.getElementById('tableBody');
            const tr = document.createElement('tr');
            
            const tdNum = document.createElement('td');
            tdNum.textContent = tbody.children.length + 1;
            tr.appendChild(tdNum);

            currentTemplate.variables.forEach(v => {
                const td = document.createElement('td');
                // input[type="text"] から textarea に変更して改行を許可
                td.innerHTML = `<textarea class="var-input" data-var="${v}" placeholder="${v}" rows="2"></textarea>`;
                tr.appendChild(td);
            });

            const tdAction = document.createElement('td');
            tdAction.innerHTML = `<button class="btn btn-secondary btn-small" onclick="this.closest('tr').remove(); updateRowNumbers();">✕</button>`;
            tr.appendChild(tdAction);

            tbody.appendChild(tr);
        }

        function updateRowNumbers() {
            const rows = document.getElementById('tableBody').children;
            for(let i=0; i<rows.length; i++) {
                rows[i].children[0].textContent = i + 1;
            }
        }

        function generateMessages() {
            if(!currentTemplate) return;

            const rows = document.getElementById('tableBody').children;
            const previewList = document.getElementById('previewList');
            previewList.innerHTML = '';

            let hasData = false;

            for(let i=0; i<rows.length; i++) {
                // textarea も取得するように変更
                const inputs = rows[i].querySelectorAll('textarea.var-input');
                let message = currentTemplate.content;
                let rowHasValue = false;

                inputs.forEach(input => {
                    const varName = input.getAttribute('data-var');
                    // ユーザーの入力値（改行を含む）を取得
                    const value = input.value; 
                    
                    // 値が空でない場合（スペースや改行のみでも入力とみなすか、ここでは少しでも文字があればOKとする）
                    if(value.trim() !== "") rowHasValue = true;
                    
                    // すべての {変数名} を置換
                    const regex = new RegExp(`\\{${varName}\\}`, 'g');
                    message = message.replace(regex, value);
                });

                // 1つも入力がない行はスキップ
                if(!rowHasValue) continue;
                hasData = true;

                // LINE URL生成 (UTF-8エンコード)
                // JSのencodeURIComponentは改行(\n)を%0Aに正しくエンコードし、LINE側で改行として解釈されます。
                const encodedMessage = encodeURIComponent(message);
                const lineUrl = `https://line.me/R/msg/text/?${encodedMessage}`;

                const card = document.createElement('div');
                card.className = 'preview-card';
                card.innerHTML = `
                    <div style="font-weight:bold; margin-bottom:10px; color: var(--text-light);">行 ${i+1}</div>
                    <div class="preview-text">${escapeHtml(message)}</div>
                    <div class="preview-actions">
                        <button class="btn btn-secondary" onclick="copyToClipboard(this, \`${escapeHtml(message).replace(/`/g, '\\`')}\`)">コピー</button>
                        <a href="${lineUrl}" target="_blank" rel="noopener noreferrer" class="btn-line">送信する</a>
                    </div>
                `;
                previewList.appendChild(card);
            }

            if(!hasData) {
                alert('データが入力されていません。');
                return;
            }

            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
        }

        function backToInput() {
            document.getElementById('resultArea').style.display = 'none';
            document.getElementById('inputArea').style.display = 'block';
        }

        // コピー機能の改善（ボタンのテキスト変更フィードバック）
        function copyToClipboard(btn, text) {
            // escapeHtmlでエスケープされた文字を元に戻してコピーする
            const unescapedText = text
                .replace(/&amp;/g, "&")
                .replace(/&lt;/g, "<")
                .replace(/&gt;/g, ">")
                .replace(/&quot;/g, '"')
                .replace(/&#39;/g, "'");

            navigator.clipboard.writeText(unescapedText).then(() => {
                const originalText = btn.textContent;
                btn.textContent = 'コピーしました！';
                btn.style.backgroundColor = 'var(--secondary-color)';
                btn.style.color = 'var(--primary-color)';
                btn.style.borderColor = 'var(--primary-color)';
                
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.backgroundColor = '';
                    btn.style.color = '';
                    btn.style.borderColor = '';
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy: ', err);
                alert('コピーに失敗しました。');
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>"']/g, function(match) {
                const escape = {
                    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
                };
                return escape[match];
            });
        }
    </script>
</body>
</html>
