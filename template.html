<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テンプレート管理 | MsgGenie</title>
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="stylesheet" href="common.css">
    <style>
        .template-list {
            display: grid;
            gap: 20px;
            margin-bottom: 30px;
        }
        .template-item {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 0;
        }
        @media (min-width: 600px) {
            .template-item {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }
        .template-info {
            flex-grow: 1;
        }
        .template-info h3 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1.2rem;
            color: var(--primary-color);
        }
        .template-vars {
            font-size: 0.9rem;
            color: var(--text-light);
            background: var(--bg-color);
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        .template-actions {
            display: flex;
            gap: 10px;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            background: white;
            border-radius: 12px;
            border: 2px dashed var(--border-color);
            color: var(--text-light);
            margin-bottom: 30px;
        }
        #templateForm {
            display: none;
        }
        .variable-hint {
            font-size: 0.9rem;
            color: var(--text-main);
            background: var(--secondary-color);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary-color);
        }
        .variable-hint code {
            background: rgba(255,255,255,0.7);
            padding: 2px 6px;
            border-radius: 4px;
            color: #b91c1c;
            font-weight: bold;
        }
        .floating-add-btn-container {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-title">💬 MsgGenie</div>
    </header>

    <main>
        <h1>テンプレート管理</h1>
        
        <div id="templateListArea">
            <div id="templateList" class="template-list">
                <!-- テンプレート一覧がここに表示される -->
                <p style="text-align:center; padding: 40px; color:var(--text-light);">データを読み込み中...</p>
            </div>
            
            <div class="floating-add-btn-container">
                <button class="btn btn-primary" style="padding: 16px 32px; font-size: 1.1rem; box-shadow: var(--shadow-lg);" onclick="showForm()">
                    ＋ 新規テンプレートを作成
                </button>
            </div>
        </div>

        <div id="templateForm" class="card">
            <h2 id="formTitle">新規作成</h2>
            <div class="variable-hint">
                💡 <strong>ヒント:</strong><br>
                文章の中で、人によって変えたい部分を <code>{名前}</code> や <code>{日程}</code> のように波括弧 <code>{}</code> で囲んでください。<br>
                送信時に自動で入力欄が作成されます。
            </div>
            
            <input type="hidden" id="templateId">
            
            <label>テンプレート名</label>
            <input type="text" id="templateName" placeholder="例：新規シフト打診" required>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <label style="font-weight: bold; margin-bottom: 0;">メッセージ本文</label>
                <button type="button" class="btn btn-secondary btn-small" onclick="insertVariablePlaceholder()" style="color: var(--primary-color); border-color: var(--primary-color);">
                    ＋ {変数}を挿入
                </button>
            </div>
            <textarea id="templateContent" rows="10" placeholder="{名前}さん、お疲れ様です。..." required></textarea>
            
            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <button class="btn btn-primary" style="flex: 1;" onclick="saveTemplate()">保存する</button>
                <button class="btn btn-secondary" style="flex: 1;" onclick="hideForm()">キャンセル</button>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 QcDa Project. All Rights Reserved.</p>
    </footer>

    <script src="common.js"></script>
    <script>
        // DOMContentLoadedではなく、Firebase初期化後のdbReadyイベントを待つ
        document.addEventListener('dbReady', loadTemplates);

        async function loadTemplates() {
            const listEl = document.getElementById('templateList');
            listEl.innerHTML = '<p style="text-align:center; padding: 40px; color:var(--text-light);">データを読み込み中...</p>';

            const templates = await DB.getTemplates();
            listEl.innerHTML = '';

            if (templates.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 3rem; margin-bottom: 10px;">📝</div>
                        <h3>テンプレートがありません</h3>
                        <p>まずは「新規テンプレートを作成」ボタンから<br>よく使うメッセージを登録しましょう。</p>
                    </div>
                `;
                return;
            }

            templates.forEach(t => {
                const varsStr = t.variables.length > 0 
                    ? `変数: {${t.variables.join('}, {')}}` 
                    : '変数なし';

                const card = document.createElement('div');
                card.className = 'card template-item';
                card.innerHTML = `
                    <div class="template-info">
                        <h3>${escapeHtml(t.name)}</h3>
                        <div class="template-vars">${escapeHtml(varsStr)}</div>
                    </div>
                    <div class="template-actions">
                        <button class="btn btn-secondary btn-small" onclick="editTemplate('${t.id}')">編集</button>
                        <button class="btn btn-danger btn-small" onclick="deleteTemplate('${t.id}')">削除</button>
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        function showForm() {
            document.getElementById('templateListArea').style.display = 'none';
            document.getElementById('templateForm').style.display = 'block';
            document.getElementById('formTitle').textContent = '新規作成';
            clearForm();
        }

        function hideForm() {
            document.getElementById('templateListArea').style.display = 'block';
            document.getElementById('templateForm').style.display = 'none';
        }

        function clearForm() {
            document.getElementById('templateId').value = '';
            document.getElementById('templateName').value = '';
            document.getElementById('templateContent').value = '';
        }

        function insertVariablePlaceholder() {
            const textarea = document.getElementById('templateContent');
            const insertText = '{ここに変数を入力}';
            
            // 現在のカーソル位置を取得
            const startPos = textarea.selectionStart;
            const endPos = textarea.selectionEnd;
            
            // テキストを分割して挿入
            const textBefore = textarea.value.substring(0, startPos);
            const textAfter = textarea.value.substring(endPos, textarea.value.length);
            textarea.value = textBefore + insertText + textAfter;
            
            // フォーカスをテキストエリアに戻す
            textarea.focus();
            
            // 挿入したテキストの「ここに変数を入力」の部分を選択状態（ハイライト）にする
            const selectionStartPos = startPos + 1; // '{' の次の文字
            const selectionEndPos = startPos + insertText.length - 1; // '}' の前の文字
            textarea.setSelectionRange(selectionStartPos, selectionEndPos);
        }

        function editTemplate(id) {
            const t = DB.getTemplateById(id);
            if (!t) return;
            
            document.getElementById('templateId').value = t.id;
            document.getElementById('templateName').value = t.name;
            document.getElementById('templateContent').value = t.content;
            
            document.getElementById('formTitle').textContent = 'テンプレート編集';
            document.getElementById('templateListArea').style.display = 'none';
            document.getElementById('templateForm').style.display = 'block';
        }

        async function saveTemplate() {
            const id = document.getElementById('templateId').value;
            const name = document.getElementById('templateName').value.trim();
            const content = document.getElementById('templateContent').value.trim();

            if (!name || !content) {
                alert('テンプレート名と本文を入力してください。');
                return;
            }

            const variables = extractVariables(content);

            // 保存中のUIブロック
            const saveBtn = document.querySelector('#templateForm .btn-primary');
            const originalText = saveBtn.textContent;
            saveBtn.textContent = '保存中...';
            saveBtn.disabled = true;
            saveBtn.style.opacity = '0.7';

            await DB.saveTemplate({
                id: id || null,
                name: name,
                content: content,
                variables: variables
            });

            // UIを元に戻す
            saveBtn.textContent = originalText;
            saveBtn.disabled = false;
            saveBtn.style.opacity = '1';

            hideForm();
            await loadTemplates();
        }

        async function deleteTemplate(id) {
            if (confirm('本当に削除しますか？')) {
                await DB.deleteTemplate(id);
                await loadTemplates();
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>"']/g, function(match) {
                const escape = {
                    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
                };
                return escape[match];
            });
        }
    </script>
</body>
</html>
